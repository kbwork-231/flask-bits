<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producers</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav style="background-color: green; padding: 10px;">
        <a href="{{ url_for('home') }}" style="color: white; text-decoration: none; margin: 0 10px;">GLH</a>
        <a href="{{ url_for('about') }}" style="color: white; text-decoration: none; margin: 0 10px;">About</a>
        <a href="{{ url_for('login') }}" style="color: white; text-decoration: none; margin: 0 10px;">Login</a>
        <a href="{{ url_for('orders') }}" style="color: white; text-decoration: none; margin: 0 10px;">Orders</a>
        <a href="{{ url_for('producers') }}" style="color: white; text-decoration: none; margin: 0 10px;">Producers</a>
        <a href="{{ url_for('products') }}" style="color: white; text-decoration: none; margin: 0 10px;">Products</a>
        <button onclick="changeFontSize()" style="background: none; border: none; color: white; font-size: 20px; cursor: pointer;">🔤</button>
    </nav>
    <style>
        nav a:hover { background-color: yellow; color: black; padding: 5px; }
    </style>
    <script>
        function changeFontSize() {
            var body = document.body;
            var currentSize = window.getComputedStyle(body).fontSize;
            var newSize = parseFloat(currentSize) * 1.2;
            if (newSize > 24) newSize = 12;
            body.style.fontSize = newSize + 'px';
        }
    </script>
    <h1>Producers</h1>
    <p>Our producers.</p>
</body>
</html>
